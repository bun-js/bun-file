name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Test and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Mise and repository tools
        uses: jdx/mise-action@v3

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          PACKAGE_VERSION=$(bun -e 'console.log((await import("./package.json")).default.version)')
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Check formatting and lint
        run: bunx biome check .

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish to npm
        run: npm publish
