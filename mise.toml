[tools]
biome = "2.5.3"
bun = "1.3.14"
"npm:knip" = "6.25.0"
"npm:sort-package-json" = "4.0.0"
"npm:typescript" = "7.0.2"

[hooks]
postinstall = "mise run mise:postinstall"

[tasks."mise:postinstall"]
description = "Run repository postinstall setup"
run = ["bun install", { "task" = "githooks:install" } ]

[tasks."githooks:install"]
description = "Install the repo-local Git hooks path"
run = "git config core.hooksPath .githooks"

[tasks."githooks:pre-commit"]
description = "Run the pre-commit validation suite"
depends = ["check"]

[tasks.check]
run = [
  "sort-package-json -q",
  "knip",
  "bun test",
  "tsc --noEmit --skipLibCheck",
  "biome check --write --unsafe"
]

[tasks.publish]
description = "Publish the package to npm"
depends = ["check"]
interactive = true
run = "bun publish"
